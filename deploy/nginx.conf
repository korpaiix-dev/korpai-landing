# In-container nginx — served behind the VPS host nginx reverse proxy.
# The host nginx handles TLS (Let's Encrypt) + HTTP/2 and proxies to this
# container's port 80. Keep this config focused on static asset serving.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/korpai;
    index index.html;

    # Hardening
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;

    # Version endpoint for deploy verification
    location = /version.txt {
        add_header Cache-Control "no-store";
    }

    # Static assets — long cache, immutable fingerprinted files
    # Astro is configured with `build.assets: '_assets'` in astro.config.mjs
    location /_assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images, fonts, and logos
    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|woff2?|ttf|eot)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # llms.txt / robots.txt / sitemap-*.xml — short cache
    location ~* ^/(llms\.txt|robots\.txt|sitemap.*\.xml)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # HTML — revalidate fast
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
        expires 10m;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    # Custom error pages (fall back to root 404 if absent)
    error_page 404 /404.html;
}
