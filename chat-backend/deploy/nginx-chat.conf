# KORP AI Chat Backend — nginx proxy snippet.
#
# Install:
#   cp chat-backend/deploy/nginx-chat.conf /etc/nginx/snippets/korpai-chat.conf
# Then inside the HTTPS server block of /etc/nginx/sites-enabled/korpai:
#   include snippets/korpai-chat.conf;
#
# The backend runs on 127.0.0.1:8100 as a systemd unit (see korpai-chat.service).

location /api/chat/ {
    # Forward client IP so the backend's rate limiter works
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $host;

    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_read_timeout 45s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;

    proxy_pass http://127.0.0.1:8100;
}
